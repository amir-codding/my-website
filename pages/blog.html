<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8" />
    <title>وبلاگ من</title>
    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle at top, #1a0026, #050505);
        color: white;
        font-family: sans-serif;
        overflow: hidden;
      }

      .box {
        text-align: center;
        animation: fadeIn 1s ease;
      }

      h1 {
        font-size: 2.5rem;
        color: #a855f7;
        margin-bottom: 10px;
        animation: float 2s infinite ease-in-out;
        margin-bottom: 380px;
      }

      p {
        color: #aaa;
        font-size: 1.1rem;
      }
      a {
        display: inline-block;
        margin-top: 20px;
        padding: 10px 18px;
        background: #a855f7;
        color: white;
        text-decoration: none;
        border-radius: 10px;
        transition: 0.3s;
      }

      a:hover {
        background: #c084fc;
        transform: translateY(-2px);
      }

      @keyframes spin {
        0% {
          transform: rotate(0);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: scale(0.95);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      /*------------ astronaut-loauder------------ */
      /* From Uiverse.io by JkHuger */
      @keyframes snow {
        0% {
          opacity: 0;
          transform: translateY(0px);
        }

        20% {
          opacity: 1;
        }

        100% {
          opacity: 1;
          transform: translateY(650px);
        }
      }

      @keyframes astronaut {
        0% {
          transform: rotate(0deg);
        }

        100% {
          transform: rotate(360deg);
        }
      }

      .box-of-star1,
      .box-of-star2,
      .box-of-star3,
      .box-of-star4 {
        width: 100%;
        position: absolute;
        z-index: 10;
        left: 0;
        top: 0;
        transform: translateY(0px);
        height: 700px;
      }

      .box-of-star1 {
        animation: snow 5s linear infinite;
      }

      .box-of-star2 {
        animation: snow 5s -1.64s linear infinite;
      }

      .box-of-star3 {
        animation: snow 5s -2.3s linear infinite;
      }

      .box-of-star4 {
        animation: snow 5s -3.3s linear infinite;
      }

      .star {
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background-color: #d9ff00;
        position: absolute;
        z-index: 10;
        opacity: 0.7;
      }

      .star:before {
        content: "";
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background-color: #eaff00;
        position: absolute;
        z-index: 10;
        top: 80px;
        left: 70px;
        opacity: 0.7;
      }

      .star:after {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background-color: #eeff00;
        position: absolute;
        z-index: 10;
        top: 8px;
        left: 170px;
        opacity: 0.9;
      }

      .star-position1 {
        top: 30px;
        left: 20px;
      }

      .star-position2 {
        top: 110px;
        left: 250px;
      }

      .star-position3 {
        top: 60px;
        left: 570px;
      }

      .star-position4 {
        top: 120px;
        left: 900px;
      }

      .star-position5 {
        top: 20px;
        left: 1120px;
      }

      .star-position6 {
        top: 90px;
        left: 1280px;
      }

      .star-position7 {
        top: 30px;
        left: 1480px;
      }

      .astronaut {
        width: 250px;
        height: 300px;
        position: absolute;
        z-index: 11;
        top: calc(50% - 150px);
        left: calc(50% - 125px);
        animation: astronaut 5s linear infinite;
      }

      .schoolbag {
        width: 100px;
        height: 150px;
        position: absolute;
        z-index: 1;
        top: calc(50% - 75px);
        left: calc(50% - 50px);
        background-color: #94b7ca;
        border-radius: 50px 50px 0 0 / 30px 30px 0 0;
      }

      .head {
        width: 97px;
        height: 80px;
        position: absolute;
        z-index: 3;
        background: -webkit-linear-gradient(
          left,
          #e3e8eb 0%,
          #e3e8eb 50%,
          #fbfdfa 50%,
          #fbfdfa 100%
        );
        border-radius: 50%;
        top: 34px;
        left: calc(50% - 47.5px);
      }

      .head:after {
        content: "";
        width: 60px;
        height: 50px;
        position: absolute;
        top: calc(50% - 25px);
        left: calc(50% - 30px);
        background: -webkit-linear-gradient(
          top,
          #15aece 0%,
          #15aece 50%,
          #0391bf 50%,
          #0391bf 100%
        );
        border-radius: 15px;
      }

      .head:before {
        content: "";
        width: 12px;
        height: 25px;
        position: absolute;
        top: calc(50% - 12.5px);
        left: -4px;
        background-color: #618095;
        border-radius: 5px;
        box-shadow: 92px 0px 0px #618095;
      }

      .body {
        width: 85px;
        height: 100px;
        position: absolute;
        z-index: 12;
        background-color: #fffbff;
        border-radius: 40px / 20px;
        top: 105px;
        left: calc(50% - 41px);
        background: -webkit-linear-gradient(
          left,
          #e3e8eb 0%,
          #e3e8eb 50%,
          #fbfdfa 50%,
          #fbfdfa 100%
        );
      }

      .panel {
        width: 60px;
        height: 40px;
        position: absolute;
        top: 20px;
        left: calc(50% - 30px);
        background-color: #b7cceb;
      }

      .panel:before {
        content: "";
        width: 30px;
        height: 5px;
        position: absolute;
        top: 9px;
        left: 7px;
        background-color: #fbfdfa;
        box-shadow:
          0px 9px 0px #fbfdfa,
          0px 18px 0px #fbfdfa;
      }

      .panel:after {
        content: "";
        width: 8px;
        height: 8px;
        position: absolute;
        top: 9px;
        right: 7px;
        background-color: #fbfdfa;
        border-radius: 50%;
        box-shadow: 0px 14px 0px 2px #fbfdfa;
      }

      .arm {
        width: 80px;
        height: 30px;
        position: absolute;
        top: 121px;
        z-index: 2;
      }

      .arm-left {
        left: 30px;
        background-color: #e3e8eb;
        border-radius: 0 0 0 39px;
      }

      .arm-right {
        right: 30px;
        background-color: #fbfdfa;
        border-radius: 0 0 39px 0;
      }

      .arm-left:before,
      .arm-right:before {
        content: "";
        width: 30px;
        height: 70px;
        position: absolute;
        top: -40px;
      }

      .arm-left:before {
        border-radius: 50px 50px 0px 120px / 50px 50px 0 110px;
        left: 0;
        background-color: #e3e8eb;
      }

      .arm-right:before {
        border-radius: 50px 50px 120px 0 / 50px 50px 110px 0;
        right: 0;
        background-color: #fbfdfa;
      }

      .arm-left:after,
      .arm-right:after {
        content: "";
        width: 30px;
        height: 10px;
        position: absolute;
        top: -24px;
      }

      .arm-left:after {
        background-color: #6e91a4;
        left: 0;
      }

      .arm-right:after {
        right: 0;
        background-color: #b6d2e0;
      }

      .leg {
        width: 30px;
        height: 40px;
        position: absolute;
        z-index: 2;
        bottom: 70px;
      }

      .leg-left {
        left: 76px;
        background-color: #e3e8eb;
        transform: rotate(20deg);
      }

      .leg-right {
        right: 73px;
        background-color: #fbfdfa;
        transform: rotate(-20deg);
      }

      .leg-left:before,
      .leg-right:before {
        content: "";
        width: 50px;
        height: 25px;
        position: absolute;
        bottom: -26px;
      }

      .leg-left:before {
        left: -20px;
        background-color: #e3e8eb;
        border-radius: 30px 0 0 0;
        border-bottom: 10px solid #6d96ac;
      }

      .leg-right:before {
        right: -20px;
        background-color: #fbfdfa;
        border-radius: 0 30px 0 0;
        border-bottom: 10px solid #b0cfe4;
      }
      /* پایه */
      body {
        margin: 0;
        overflow: hidden;
      }

      /* بک‌گراند کامل صفحه */
      .scene {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      /* جلوگیری از بیرون زدن ستاره‌ها */
      .box-of-star1,
      .box-of-star2,
      .box-of-star3,
      .box-of-star4 {
        width: 100vw;
        height: 100vh;
        left: 0;
        top: 0;
        position: absolute;
      }

      /* مهم‌ترین اصلاح: جلوگیری از خروج ستاره‌ها */
      .star-position1 {
        left: 5vw;
      }
      .star-position2 {
        left: 15vw;
      }
      .star-position3 {
        left: 30vw;
      }
      .star-position4 {
        left: 50vw;
      }
      .star-position5 {
        left: 65vw;
      }
      .star-position6 {
        left: 80vw;
      }
      .star-position7 {
        left: 90vw;
      }

      /* astronaut همیشه وسط و قابل کنترل */
      .astronaut {
        width: 250px;
        height: 300px;
        position: absolute;
        top: 40%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.5);
        animation: astronaut 5s linear infinite;
      }

      /* اینو اصلاح کن که transform رو خراب نکنه */
      @keyframes astronaut {
        0% {
          transform: translate(-50%, -50%) scale(0.5) rotate(0deg);
        }
        100% {
          transform: translate(-50%, -50%) scale(0.5) rotate(360deg);
        }
      }
      /* موبایل */
      @media (max-width: 600px) {
        /* مهم: حذف scale که خراب می‌کرد */
        .scene {
          transform: none;
        }
        .box h1 {
          font-size: 1.5rem;
          margin: 40px 0 300px 0;
        }
        .box a {
          font-size: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="scene">
      <div class="box">
        <h1>به‌زودی منتشر می‌شود</h1>
        <!-- From Uiverse.io by JkHuger -->
        <div class="box-of-star1">
          <div class="star star-position1"></div>
          <div class="star star-position2"></div>
          <div class="star star-position3"></div>
          <div class="star star-position4"></div>
          <div class="star star-position5"></div>
          <div class="star star-position6"></div>
          <div class="star star-position7"></div>
        </div>
        <div class="box-of-star2">
          <div class="star star-position1"></div>
          <div class="star star-position2"></div>
          <div class="star star-position3"></div>
          <div class="star star-position4"></div>
          <div class="star star-position5"></div>
          <div class="star star-position6"></div>
          <div class="star star-position7"></div>
        </div>
        <div class="box-of-star3">
          <div class="star star-position1"></div>
          <div class="star star-position2"></div>
          <div class="star star-position3"></div>
          <div class="star star-position4"></div>
          <div class="star star-position5"></div>
          <div class="star star-position6"></div>
          <div class="star star-position7"></div>
        </div>
        <div class="box-of-star4">
          <div class="star star-position1"></div>
          <div class="star star-position2"></div>
          <div class="star star-position3"></div>
          <div class="star star-position4"></div>
          <div class="star star-position5"></div>
          <div class="star star-position6"></div>
          <div class="star star-position7"></div>
        </div>
        <div data-js="astro" class="astronaut">
          <div class="head"></div>
          <div class="arm arm-left"></div>
          <div class="arm arm-right"></div>
          <div class="body">
            <div class="panel"></div>
          </div>
          <div class="leg leg-left"></div>
          <div class="leg leg-right"></div>
          <div class="schoolbag"></div>
        </div>
        <p>این بخش از سایت در حال توسعه است</p>
      </div>
    </div>
  </body>
</html>
